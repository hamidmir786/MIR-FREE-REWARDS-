<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>MIR FREE REWARDS Login</title><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script><script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script></head><body><h2>MIR FREE REWARDS</h2><button onclick="googleLogin()">Sign in with Google</button><div id="reg" style="display:none"><input id="pin" maxlength="4" placeholder="4 digit PIN"><input id="dob" type="date"><button onclick="registerUser()">Register</button></div><script>const firebaseConfig={apiKey:"YOUR_KEY",authDomain:"YOUR_DOMAIN",projectId:"YOUR_PROJECT_ID"};if(!firebase.apps.length){firebase.initializeApp(firebaseConfig)}const auth=firebase.auth();const db=firebase.firestore();let currentUser=null;function getDeviceID(){let id=localStorage.getItem('mir_device');if(!id){id='MIR-'+Math.random().toString(36).slice(2)+navigator.userAgent.slice(0,10);localStorage.setItem('mir_device',id);}return id;}async function googleLogin(){try{const res=await auth.signInWithPopup(new firebase.auth.GoogleAuthProvider());currentUser=res.user;const device=getDeviceID();const snap=await db.collection('users').where('deviceToken','==',device).get();let owner=null;snap.forEach(d=>owner=d.data().uid);if(owner&&owner!==currentUser.uid){alert('Only one account per device allowed.');await auth.signOut();return;}const doc=await db.collection('users').doc(currentUser.uid).get();if(doc.exists){const data=doc.data();if(data.deviceToken!==device){alert('Account locked to another device.');await auth.signOut();return;}window.location.href='homepage.html';}else{document.getElementById('reg').style.display='block';}}catch(e){alert(e.message);}}async function registerUser(){const pin=document.getElementById('pin').value.trim();const dob=document.getElementById('dob').value;if(pin.length!==4||isNaN(pin)){alert('Invalid PIN');return;}if(!dob){alert('Select DOB');return;}const device=getDeviceID();await db.collection('users').doc(currentUser.uid).set({uid:currentUser.uid,name:currentUser.displayName,email:currentUser.email,coins:0,securePin:pin,recoveryDob:dob,deviceToken:device,accountStatus:'ACTIVE',createdAt:firebase.firestore.FieldValue.serverTimestamp()});window.location.href='homepage.html';}</script></body></html>
