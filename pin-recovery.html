<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIN Recovery - MIR FREE REWARDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { background-color: #09070f; color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .premium-panel { background: rgba(19, 15, 36, 0.9); border: 1px solid rgba(168, 85, 247, 0.2); }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen justify-between">

    <div class="max-w-md mx-auto w-full space-y-4">
        
        <!-- HEADER NAV -->
        <div class="flex items-center justify-between p-3 rounded-2xl premium-panel shadow-lg">
            <a href="index.html" class="px-3 py-1.5 bg-purple-950/60 border border-purple-800/40 rounded-xl text-purple-300 text-xs font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Login
            </a>
            <span class="text-xs font-black text-purple-400 font-mono">RECOVERY CENTER</span>
        </div>

        <!-- MAIN FORM -->
        <div class="p-5 rounded-3xl premium-panel space-y-4 shadow-2xl">
            <div class="text-center space-y-1">
                <h2 class="text-sm font-black uppercase text-white tracking-wider">Recover Account PIN</h2>
                <p class="text-[11px] text-gray-400">Enter your Username & DOB to verify identity.</p>
            </div>

            <div class="space-y-3">
                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Registered Username / Email</label>
                    <input id="recoverInput" type="text" placeholder="Enter username or email" class="w-full p-3 rounded-xl bg-black/50 border border-purple-900/40 text-xs text-white focus:outline-none focus:border-purple-500">
                </div>

                <div>
                    <label class="text-[10px] font-bold text-gray-400 uppercase tracking-wider block mb-1">Date of Birth (DOB)</label>
                    <input id="recoverDOB" type="date" class="w-full p-3 rounded-xl bg-black/50 border border-purple-900/40 text-xs text-white focus:outline-none focus:border-purple-500">
                </div>

                <button onclick="verifyAndRecoverPIN()" class="w-full py-3.5 bg-purple-600 hover:bg-purple-500 text-white font-black text-xs uppercase tracking-wider rounded-xl shadow-lg active:scale-95 transition-all">
                    VERIFY & RECOVER PIN
                </button>
            </div>

            <!-- RESULT DISPLAY -->
            <div id="recoveryResult" class="hidden p-3 rounded-xl bg-emerald-950/50 border border-emerald-500/30 text-center space-y-1">
                <p class="text-[10px] text-emerald-400 font-bold uppercase">Identity Verified!</p>
                <p class="text-xs text-white font-mono">Your Security PIN: <span id="revealedPIN" class="font-bold text-amber-400">----</span></p>
            </div>
        </div>

    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD0AZG6D8H-OZOJK0s5sDyVJ6BLJJKVszc",
          authDomain: "mir-free-rewards-log-and-earn.firebaseapp.com",
          databaseURL: "https://mir-free-rewards-log-and-earn-default-rtdb.firebaseio.com",
          projectId: "mir-free-rewards-log-and-earn",
          storageBucket: "mir-free-rewards-log-and-earn.firebasestorage.app",
          messagingSenderId: "1055267295995",
          appId: "1:1055267295995:web:35ebcfaa35a650a832165e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        function verifyAndRecoverPIN() {
            const userInput = document.getElementById("recoverInput").value.trim();
            const dobInput = document.getElementById("recoverDOB").value;

            if (!userInput || !dobInput) {
                alert("❌ Please enter Username/Email and DOB.");
                return;
            }

            db.collection("users").where("dob", "==", dobInput).get().then((snapshot) => {
                let foundUser = null;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    if (data.username === userInput || data.email === userInput) {
                        foundUser = data;
                    }
                });

                if (foundUser) {
                    document.getElementById("recoveryResult").classList.remove("hidden");
                    document.getElementById("revealedPIN").innerText = foundUser.pin || "No PIN Set";
                } else {
                    alert("❌ Invalid Details! DOB or Username does not match.");
                }
            }).catch(() => {
                alert("⚠️ Error fetching data. Try again.");
            });
        }
    </script>
</body>
</html>
