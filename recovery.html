<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PIN & DOB Recovery - MIR FREE REWARDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            background-color: #09070f;
            color: #f3f4f6;
            font-family: 'Segoe UI', system-ui, sans-serif;
        }
        .premium-panel {
            background: rgba(19, 15, 36, 0.9);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }
        .task-card {
            background: linear-gradient(135deg, #1f0f18 0%, #0d0a1a 100%);
            border: 1px solid rgba(239, 68, 68, 0.15);
        }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen justify-between">

    <div class="max-w-md mx-auto w-full space-y-4">
        
        <!-- HEADER NAV -->
        <div class="flex items-center justify-between p-3 rounded-2xl premium-panel shadow-lg">
            <a href="homepage.html" class="px-3 py-1.5 bg-red-950/60 border border-red-800/40 rounded-xl text-red-300 text-xs font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Home
            </a>
            <div class="flex items-center gap-1.5 bg-black/50 px-3 py-1 rounded-xl border border-amber-500/30 font-mono">
                <i class="fa-solid fa-coins text-amber-400 text-xs"></i>
                <span id="userCoins" class="text-xs font-black text-amber-300">0</span>
            </div>
        </div>

        <!-- MAIN RECOVERY CONTAINER -->
        <div class="p-5 rounded-3xl premium-panel text-center space-y-4 shadow-2xl">
            <div class="flex justify-between items-center border-b border-red-900/30 pb-3">
                <h2 class="text-xs font-black uppercase tracking-wider text-red-400 flex items-center gap-2">
                    <i class="fa-solid fa-key text-red-500"></i> Recovery PIN & DOB Terminal
                </h2>
                <span class="text-[9px] bg-red-950 border border-red-800 text-red-300 px-2 py-0.5 rounded-md font-mono font-bold">500 COINS</span>
            </div>

            <!-- CARD DETAIL -->
            <div class="p-4 rounded-2xl task-card text-left space-y-3">
                <div class="flex items-start gap-3">
                    <div class="w-10 h-10 rounded-xl bg-red-900/40 border border-red-500/30 flex items-center justify-center text-red-400 shrink-0">
                        <i class="fa-solid fa-shield-halved text-lg"></i>
                    </div>
                    <div>
                        <h3 class="text-xs font-black text-white uppercase">Secure Vault Extraction</h3>
                        <p class="text-[9px] text-gray-400 mt-0.5">Request manual retrieval of your account PIN and Date of Birth details directly from Admin logs.</p>
                    </div>
                </div>

                <div class="bg-black/50 p-2.5 rounded-xl border border-red-900/20 text-[9px] text-gray-300 space-y-1 font-mono">
                    <div class="flex justify-between">
                        <span class="text-gray-500">Fee Required:</span>
                        <span class="text-amber-400 font-bold">500 Coins</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">Processing Time:</span>
                        <span class="text-gray-300">Up to 48 Hours</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-500">Delivery Channel:</span>
                        <span class="text-purple-400 font-bold">System Mailbox</span>
                    </div>
                </div>
            </div>

            <!-- ACTION BUTTON -->
            <button id="requestBtn" onclick="dispatchRecoveryRequest()" class="w-full py-3.5 bg-gradient-to-r from-red-800 to-red-600 hover:from-red-700 hover:to-red-500 font-black text-xs text-white uppercase tracking-widest rounded-2xl shadow-lg active:scale-95 transition-all">
                Request PIN & DOB (500 Coins)
            </button>
        </div>

    </div>

    <!-- FIREBASE AND RECOVERY SCRIPT ENGINE -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD0AZG6D8H-OZOJK0s5sDyVJ6BLJJKVszc",
          authDomain: "mir-free-rewards-log-and-earn.firebaseapp.com",
          databaseURL: "https://mir-free-rewards-log-and-earn-default-rtdb.firebaseio.com",
          projectId: "mir-free-rewards-log-and-earn",
          storageBucket: "mir-free-rewards-log-and-earn.firebasestorage.app",
          messagingSenderId: "1055267295995",
          appId: "1:1055267295995:web:35ebcfaa35a650a832165e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let uid = null, userState = {};

        auth.onAuthStateChanged((user) => {
            if (user) {
                uid = user.uid;
                db.collection("users").doc(uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        userState = doc.data();
                        document.getElementById("userCoins").innerText = userState.coins || 0;
                    }
                });
            } else {
                window.location.href = "index.html";
            }
        });

        function loadAd(cb) { setTimeout(cb, 800); }

        function dispatchRecoveryRequest() {
            const currentCoins = userState.coins || 0;
            if (currentCoins < 500) {
                alert("❌ Insufficient Coins! You need at least 500 Coins to submit a recovery request.");
                return;
            }

            const btn = document.getElementById("requestBtn");
            btn.disabled = true;

            loadAd(() => {
                const requestId = db.collection("adminRequests").doc().id;
                const batch = db.batch();

                const userRef = db.collection("users").doc(uid);
                const userMailboxRef = db.collection("users").doc(uid).collection("mailbox").doc(requestId);
                const adminGlobalRef = db.collection("adminRequests").doc(requestId);

                // 1. Deduct 500 Coins
                batch.update(userRef, { 
                    coins: firebase.firestore.FieldValue.increment(-500) 
                });
                
                // 2. Add confirmation notice to User's Mailbox
                batch.set(userMailboxRef, {
                    title: "🔑 Recovery Request Submitted",
                    body: "your pin and DOB on your mailbox upto 48 hours",
                    timestamp: new Date().toLocaleString(),
                    read: false
                });

                // 3. Send detailed alert ticket to Admin's central database node
                batch.set(adminGlobalRef, {
                    requestId: requestId,
                    userId: uid,
                    userEmail: userState.email || "No Email Bound",
                    userName: userState.name || "User",
                    requestType: "RECOVERY_PIN_AND_DOB",
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    status: "PENDING"
                });

                batch.commit().then(() => {
                    alert("your pin and DOB on your mailbox upto 48 hours");
                    btn.disabled = false;
                    window.location.href = "homepage.html";
                }).catch((error) => {
                    alert("⚠️ Error processing request: " + error.message);
                    btn.disabled = false;
                });
            });
        }
    </script>
</body>
</html>
