<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIR CORE TERMINAL - Admin Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#05050a] text-gray-300 min-h-screen font-sans pb-12">

    <!-- Top Admin Header -->
    <header class="bg-[#0b0b14] border-b border-purple-950/60 px-5 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-900/30 rounded-xl border border-purple-500/30 flex items-center justify-center text-purple-400 text-lg shadow-[0_0_15px_rgba(147,51,234,0.15)]">
                <i class="fa-solid fa-user-shield animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-sm font-black text-white tracking-wider uppercase">MIR CORE TERMINAL</h1>
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">GLOBAL MASTER SUITE</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="triggerKeyConfigModal()" class="px-2.5 py-1.5 bg-white/5 border border-gray-800 hover:border-purple-900 text-gray-300 text-[10px] font-bold rounded-lg transition-all flex items-center gap-1">
                <i class="fa-solid fa-key text-purple-400"></i> Key Config
            </button>
            <button onclick="handleAdminLogout()" class="px-2.5 py-1.5 bg-red-950/20 border border-red-900/30 hover:bg-red-900/30 text-red-400 text-[10px] font-bold rounded-lg transition-all flex items-center gap-1">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </header>

    <!-- Admin Analytics Hub -->
    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Live Dashboard Counters -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#0b0b14] border border-gray-900 p-3.5 rounded-2xl relative overflow-hidden">
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Total Users</p>
                <h3 id="statTotalUsers" class="text-2xl font-black text-white font-mono mt-1">0</h3>
                <i class="fa-solid fa-users absolute right-4 bottom-4 text-white/5 text-xl"></i>
            </div>
            <div class="bg-[#0b0b14] border border-gray-900 p-3.5 rounded-2xl relative overflow-hidden">
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Circulating Balance</p>
                <div class="flex items-baseline gap-1 mt-1">
                    <h3 id="statCirculatingCoins" class="text-2xl font-black text-yellow-400 font-mono">0</h3>
                    <span class="text-[10px] text-gray-400 font-bold">🪙</span>
                </div>
                <i class="fa-solid fa-coins absolute right-4 bottom-4 text-white/5 text-xl"></i>
            </div>
        </div>

        <!-- Navigation Tabs Matrix -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="switchAdminTab('usersListSection')" id="tabBtn-users" class="py-2.5 bg-purple-900/20 border border-purple-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-users-gear"></i> Users Hub
            </button>
            <button onclick="switchAdminTab('redeemRequestsSection')" id="tabBtn-redeem" class="py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-money-bill-transfer"></i> Redeem Requests
            </button>
            <button onclick="toggleLeaderboardFreeze()" id="leaderboardFreezeBtn" class="py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-snowflake"></i> Leaderboard Freeze
            </button>
            <button onclick="triggerAnnouncementModal()" class="py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-bullhorn"></i> Global Alert
            </button>
        </div>

        <!-- SEARCH INPUT BOX -->
        <div class="relative">
            <input type="text" id="adminUserSearchBar" oninput="executeClientSearchFilter()" placeholder="Search by UID, Email, or Name..." class="w-full px-4 py-2.5 bg-[#0b0b14] border border-gray-900 rounded-xl text-xs text-white placeholder-gray-600 outline-none focus:border-purple-800 transition-all font-mono">
            <i class="fa-solid fa-magnifying-glass absolute right-4 top-3 text-gray-600 text-xs"></i>
        </div>

        <!-- SECTION 1: USERS LIVE HUB -->
        <section id="usersListSection" class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><i class="fa-solid fa-database text-purple-500"></i> Registered Database Records</h4>
                <button onclick="fetchLatestAdminData()" class="text-[9px] text-purple-400 hover:text-purple-300 font-bold"><i class="fa-solid fa-arrows-rotate"></i> Reload Table</button>
            </div>
            <div id="usersDataContainer" class="space-y-2.5">
                <!-- User rows render dynamically here -->
            </div>
        </section>

        <!-- SECTION 2: REDEEM REQUESTS PORTAL -->
        <section id="redeemRequestsSection" class="space-y-3 hidden">
            <div class="flex justify-between items-center px-1">
                <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><i class="fa-solid fa-receipt text-yellow-500"></i> Pending Redeem Queue</h4>
                <p class="text-[9px] text-gray-500 font-mono">Real-time Claims Desk</p>
            </div>
            <div id="redeemRequestsContainer" class="space-y-2.5">
                <!-- Redeem rows render dynamically here -->
            </div>
        </section>

    </main>

    <!-- DYNAMIC OVERLAY MODALS -->
    <div id="adminPortalModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center p-4 z-50">
        <div id="adminModalBody" class="w-full max-w-sm bg-[#0b0b14] border border-gray-900 p-5 rounded-2xl space-y-4">
            <!-- Dynamic modal content renders here -->
        </div>
    </div>

    <script>
        // Core Web Configuration Keys
        const firebaseConfig = {
          apiKey: "AIzaSyD0AZG6D8H-OZOJK0s5sDyVJ6BLJJKVszc",
          authDomain: "mir-free-rewards-log-and-earn.firebaseapp.com",
          databaseURL: "https://mir-free-rewards-log-and-earn-default-rtdb.firebaseio.com",
          projectId: "mir-free-rewards-log-and-earn",
          storageBucket: "mir-free-rewards-log-and-earn.firebasestorage.app",
          messagingSenderId: "1055267295995",
          appId: "1:1055267295995:web:35ebcfaa35a650a832165e"
        };

        // Standard Initialization
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        let cachedUsersList = [];
        let isLeaderboardFrozenState = false;

        // DIRECT REFRESH AUTO RUN
        window.onload = function() {
            fetchLatestAdminData();
            listenToLeaderboardConfig();
        };

        // CORE SYNC & DATA FETCH
        function fetchLatestAdminData() {
            db.collection("users").get().then(snap => {
                cachedUsersList = [];
                let totalCoins = 0;
                
                snap.forEach(doc => {
                    const data = doc.data();
                    data.uid = doc.id;
                    cachedUsersList.push(data);
                    totalCoins += parseInt(data.coins || 0);
                });

                // Client sorting logic
                cachedUsersList.sort((a, b) => {
                    const dateA = a.createdAt ? (a.createdAt.seconds || 0) : 0;
                    const dateB = b.createdAt ? (b.createdAt.seconds || 0) : 0;
                    return dateB - dateA;
                });

                document.getElementById("statTotalUsers").innerText = cachedUsersList.length;
                document.getElementById("statCirculatingCoins").innerText = totalCoins;

                renderUsersListMarkup(cachedUsersList);
                fetchRedeemRequestsQueue();
            }).catch(err => {
                console.error("Database connection missing:", err);
            });
        }

        function listenToLeaderboardConfig() {
            db.collection("app_admin").doc("leaderboard_config").onSnapshot(doc => {
                if (doc.exists) {
                    isLeaderboardFrozenState = doc.data().frozen || false;
                    const btn = document.getElementById("leaderboardFreezeBtn");
                    if (isLeaderboardFrozenState) {
                        btn.className = "py-2.5 bg-red-950/20 border border-red-900/40 text-red-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
                        btn.innerHTML = `<i class="fa-solid fa-snowflake animate-spin-slow"></i> Leaderboard Frozen`;
                    } else {
                        btn.className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
                        btn.innerHTML = `<i class="fa-solid fa-snowflake"></i> Leaderboard Freeze`;
                    }
                }
            }, err => {
                console.error("Leaderboard Config Error: ", err);
            });
        }

        function fetchRedeemRequestsQueue() {
            db.collection("redeem_requests").get().then(snap => {
                const container = document.getElementById("redeemRequestsContainer");
                container.innerHTML = "";
                
                if (snap.empty) {
                    container.innerHTML = `<p class="text-center text-gray-600 py-6 text-xs font-semibold">Redeem requests queue is clean!</p>`;
                    return;
                }

                let requestsArray = [];
                snap.forEach(doc => {
                    const rData = doc.data();
                    rData.id = doc.id;
                    requestsArray.push(rData);
                });

                requestsArray.sort((a, b) => {
                    const timeA = a.timestamp ? (a.timestamp.seconds || 0) : 0;
                    const timeB = b.timestamp ? (b.timestamp.seconds || 0) : 0;
                    return timeB - timeA;
                });

                requestsArray.forEach(req => {
                    const reqId = req.id;
                    const item = document.createElement("div");
                    item.className = `p-3.5 bg-black/30 border ${req.status === 'PENDING' ? 'border-yellow-900/40' : 'border-gray-900'} rounded-2xl text-xs space-y-2`;
                    
                    const label = req.amountLabel || "N/A Coins Package";
                    const address = req.targetAddress || "No target address specified";
                    const statusVal = req.status || "PENDING";

                    item.innerHTML = `
                        <div class="flex justify-between items-center">
                            <span class="text-[9px] font-mono text-gray-500">ID: ${reqId.substring(0, 8)}...</span>
                            <span class="px-2 py-0.5 rounded text-[8px] font-black tracking-wider ${statusVal === 'PENDING' ? 'bg-yellow-950/40 text-yellow-400 border border-yellow-800/30' : 'bg-green-950/40 text-green-400 border border-green-800/30'}">${statusVal}</span>
                        </div>
                        <div>
                            <p class="font-bold text-white text-[11px]">${label}</p>
                            <p class="text-purple-400 font-mono text-[10px] mt-0.5">Target: ${address}</p>
                        </div>
                        ${statusVal === 'PENDING' ? `
                        <div class="flex gap-2 pt-1.5">
                            <button onclick="approveRedeemTicket('${reqId}', '${req.userUid || ''}', '${label}')" class="flex-1 py-1 bg-green-700 hover:bg-green-600 text-white text-[9px] font-bold rounded-lg uppercase">Approve</button>
                            <button onclick="rejectRedeemTicket('${reqId}', '${req.userUid || ''}')" class="flex-1 py-1 bg-red-900/40 hover:bg-red-900/60 text-red-400 text-[9px] font-bold rounded-lg uppercase">Reject</button>
                        </div>
                        ` : ''}
                    `;
                    container.appendChild(item);
                });
            }).catch(err => {
                console.error("Redeem Queue Fetch Error: ", err);
            });
        }

        // RENDER DOM ELEMENTS SAFELY WITH FALLBACK
        function renderUsersListMarkup(list) {
            const container = document.getElementById("usersDataContainer");
            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-600 py-6 text-xs">No users match your criteria</p>`;
                return;
            }

            list.forEach(user => {
                const card = document.createElement("div");
                card.className = "bg-[#0b0b14] border border-gray-900 p-3.5 rounded-2xl text-xs space-y-2";
                
                const username = user.name || "Anonymous User";
                const useremail = user.email || "no-email@registered.com";
                const usercoins = user.coins || 0;
                const securePin = user.securePin || "Not Setup";
                const recoveryDob = user.recoveryDob || "Not Setup";

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-white">${username}</h4>
                            <p class="text-gray-500 font-mono text-[10px]">${useremail}</p>
                        </div>
                        <div class="bg-purple-950/30 border border-purple-900/40 px-2 py-0.5 rounded-lg text-purple-400 font-mono font-bold text-[10px]">
                            ${usercoins} 🪙
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[10px] bg-black/30 p-2 rounded-xl text-gray-400 font-mono">
                        <div>PIN: ${securePin}</div>
                        <div>DOB: ${recoveryDob}</div>
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button onclick="promptEditCoins('${user.uid}', ${usercoins})" class="flex-1 py-1.5 bg-purple-950/30 hover:bg-purple-900/50 border border-purple-800/30 text-purple-300 text-[9px] font-bold rounded-lg uppercase"><i class="fa-solid fa-pen-to-square"></i> Edit Coins</button>
                        <button onclick="deleteUserRecord('${user.uid}')" class="py-1.5 px-3 bg-red-950/20 border border-red-900/30 hover:bg-red-900/30 text-red-400 text-[9px] font-bold rounded-lg uppercase"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        // TAB NAVIGATION ROUTINES
        function switchAdminTab(activeSectionId) {
            document.getElementById("usersListSection").classList.add("hidden");
            document.getElementById("redeemRequestsSection").classList.add("hidden");
            document.getElementById("tabBtn-users").className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
            document.getElementById("tabBtn-redeem").className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";

            document.getElementById(activeSectionId).classList.remove("hidden");
            
            if (activeSectionId === "usersListSection") {
                document.getElementById("tabBtn-users").className = "py-2.5 bg-purple-900/20 border border-purple-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
            } else {
                document.getElementById("tabBtn-redeem").className = "py-2.5 bg-purple-900/20 border border-purple-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
            }
        }

        // LEADERBOARD FREEZE CONTROL
        function toggleLeaderboardFreeze() {
            const targetState = !isLeaderboardFrozenState;
            db.collection("app_admin").doc("leaderboard_config").set({
                frozen: targetState
            }).then(() => {
                alert(`Leaderboard status successfully updated!`);
            }).catch(err => {
                alert("Error: Database permission issue!");
            });
        }

        // FILTER SEARCH
        function executeClientSearchFilter() {
            const query = document.getElementById("adminUserSearchBar").value.toLowerCase().trim();
            if (query === "") {
                renderUsersListMarkup(cachedUsersList);
                return;
            }

            const filtered = cachedUsersList.filter(user => {
                const uid = (user.uid || "").toLowerCase();
                const email = (user.email || "").toLowerCase();
                const name = (user.name || "").toLowerCase();
                return uid.includes(query) || email.includes(query) || name.includes(query);
            });

            renderUsersListMarkup(filtered);
        }

        // ADMIN DATABASE ACTIONS
        function promptEditCoins(userUid, currentCoins) {
            const amount = prompt(`Enter new coin amount for this user:`, currentCoins);
            if (amount === null || isNaN(amount) || amount === "") return;

            db.collection("users").doc(userUid).update({
                coins: parseInt(amount)
            }).then(() => {
                alert("User balance updated!");
                fetchLatestAdminData();
            });
        }

        function deleteUserRecord(userUid) {
            if (!confirm("Are you sure you want to completely erase this user account from database?")) return;
            db.collection("users").doc(userUid).delete().then(() => {
                alert("User record cleared!");
                fetchLatestAdminData();
            });
        }

        // APPROVE / REJECT TICKETS
        function approveRedeemTicket(requestId, userUid, amountLabel) {
            const code = prompt("Enter the Reward Redeem Code to send to the user:");
            if (code === null || code.trim() === "") return;

            db.collection("redeem_requests").doc(requestId).update({
                status: "APPROVED",
                resolvedCode: code
            }).then(() => {
                if(userUid && userUid !== "") {
                    db.collection("users").doc(userUid).collection("mailbox").add({
                        title: "🎁 Payout Approved!",
                        message: `Your withdrawal for ${amountLabel} has been processed successfully. Copy your redeem key below!`,
                        systemCode: code,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert("Ticket approved and mail delivered to user!");
                        fetchLatestAdminData();
                    });
                } else {
                    alert("Ticket approved but user ID was null.");
                    fetchLatestAdminData();
                }
            });
        }

        function rejectRedeemTicket(requestId, userUid) {
            if (!confirm("Reject this withdrawal request?")) return;

            db.collection("redeem_requests").doc(requestId).update({
                status: "REJECTED"
            }).then(() => {
                if(userUid && userUid !== "") {
                    db.collection("users").doc(userUid).collection("mailbox").add({
                        title: "⚠️ Payout Rejected",
                        message: `Your withdrawal request was rejected due to verification issues. Contact Support for details.`,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(() => {
                        alert("Ticket rejected!");
                        fetchLatestAdminData();
                    });
                } else {
                    alert("Ticket rejected.");
                    fetchLatestAdminData();
                }
            });
        }

        // GLOBAL ALERTS & SYSTEM CONFIG MODALS
        function triggerAnnouncementModal() {
            const modal = document.getElementById("adminPortalModal");
            const body = document.getElementById("adminModalBody");
            modal.style.display = "flex";

            body.innerHTML = `
                <div class="flex justify-between items-center pb-2 border-b border-gray-800">
                    <h3 class="text-xs font-bold text-white uppercase"><i class="fa-solid fa-bullhorn text-purple-400"></i> Dispatch Global Alert</h3>
                    <button onclick="closeAdminPortalModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="space-y-3 pt-2 text-xs">
                    <textarea id="globalAlertText" rows="3" placeholder="Write standard announcement message..." class="w-full p-2.5 bg-black/40 border border-gray-900 rounded-lg text-white outline-none resize-none"></textarea>
                    <button onclick="dispatchGlobalAnnouncements()" class="w-full py-2 bg-purple-700 hover:bg-purple-600 text-white font-bold rounded-lg uppercase">Send to All Users</button>
                </div>
            `;
        }

        function dispatchGlobalAnnouncements() {
            const message = document.getElementById("globalAlertText").value.trim();
            if (message === "") return;

            db.collection("users").get().then(snap => {
                let batch = db.batch();
                snap.forEach(doc => {
                    const mailRef = db.collection("users").doc(doc.id).collection("mailbox").doc();
                    batch.set(mailRef, {
                        title: "📢 System Notification",
                        message: message,
                        timestamp: firebase.firestore.FieldValue.serverTimestamp()
                    });
                });

                batch.commit().then(() => {
                    alert("📢 Global Announcement delivered to all users successfully!");
                    closeAdminPortalModal();
                });
            });
        }

        function triggerKeyConfigModal() {
            const modal = document.getElementById("adminPortalModal");
            const body = document.getElementById("adminModalBody");
            modal.style.display = "flex";

            body.innerHTML = `
                <div class="flex justify-between items-center pb-2 border-b border-gray-800">
                    <h3 class="text-xs font-bold text-white uppercase"><i class="fa-solid fa-key text-purple-400"></i> Edit Credentials</h3>
                    <button onclick="closeAdminPortalModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="space-y-3 pt-2 text-xs">
                    <div>
                        <label class="block text-[9px] text-gray-500 font-bold uppercase mb-1">Username</label>
                        <input type="text" id="editAdminUsername" class="w-full px-3 py-2 bg-black/40 border border-gray-900 rounded-lg text-white">
                    </div>
                    <div>
                        <label class="block text-[9px] text-gray-500 font-bold uppercase mb-1">New Password</label>
                        <input type="password" id="editAdminPassword" class="w-full px-3 py-2 bg-black/40 border border-gray-900 rounded-lg text-white">
                    </div>
                    <button onclick="saveNewAdminKeys()" class="w-full py-2 bg-purple-700 hover:bg-purple-600 text-white font-bold rounded-lg uppercase">Update Key</button>
                </div>
            `;

            db.collection("app_admin").doc("credentials").get().then(doc => {
                if (doc.exists) {
                    document.getElementById("editAdminUsername").value = doc.data().username || "admin";
                    document.getElementById("editAdminPassword").value = doc.data().password || "root123";
                }
            });
        }

        function saveNewAdminKeys() {
            const u = document.getElementById("editAdminUsername").value.trim();
            const p = document.getElementById("editAdminPassword").value.trim();

            if (u === "" || p === "") {
                alert("Credentials can't be empty!");
                return;
            }

            db.collection("app_admin").doc("credentials").set({
                username: u,
                password: p
            }).then(() => {
                alert("🔑 Administration credentials changed successfully!");
                closeAdminPortalModal();
            });
        }

        function closeAdminPortalModal() {
            document.getElementById("adminPortalModal").style.display = "none";
        }

        function handleAdminLogout() {
            sessionStorage.removeItem("admin_authenticated_session");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
