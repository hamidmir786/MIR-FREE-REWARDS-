<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIR CORE TERMINAL - Admin Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>
<body class="bg-[#05050a] text-gray-300 min-h-screen font-sans pb-12">

    <!-- Top Admin Header -->
    <header class="bg-[#0b0b14] border-b border-purple-950/60 px-5 py-4 flex justify-between items-center sticky top-0 z-50">
        <div class="flex items-center gap-3">
            <div class="w-10 h-10 bg-purple-900/30 rounded-xl border border-purple-500/30 flex items-center justify-center text-purple-400 text-lg shadow-[0_0_15px_rgba(147,51,234,0.15)]">
                <i class="fa-solid fa-user-shield animate-pulse"></i>
            </div>
            <div>
                <h1 class="text-sm font-black text-white tracking-wider uppercase">MIR CORE TERMINAL</h1>
                <p class="text-[9px] text-purple-400 font-bold uppercase tracking-widest">GLOBAL MASTER SUITE</p>
            </div>
        </div>
        <div class="flex items-center gap-2">
            <button onclick="triggerKeyConfigModal()" class="px-2.5 py-1.5 bg-white/5 border border-gray-800 hover:border-purple-900 text-gray-300 text-[10px] font-bold rounded-lg transition-all flex items-center gap-1">
                <i class="fa-solid fa-key text-purple-400"></i> Key Config
            </button>
            <button onclick="handleAdminLogout()" class="px-2.5 py-1.5 bg-red-950/20 border border-red-900/30 hover:bg-red-900/30 text-red-400 text-[10px] font-bold rounded-lg transition-all flex items-center gap-1">
                <i class="fa-solid fa-right-from-bracket"></i> Logout
            </button>
        </div>
    </header>

    <!-- Admin Analytics Hub -->
    <main class="max-w-md mx-auto p-4 space-y-4">
        
        <!-- Live Dashboard Counters -->
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-[#0b0b14] border border-gray-900 p-3.5 rounded-2xl relative overflow-hidden">
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Total Users</p>
                <h3 id="statTotalUsers" class="text-2xl font-black text-white font-mono mt-1">0</h3>
                <i class="fa-solid fa-users absolute right-4 bottom-4 text-white/5 text-xl"></i>
            </div>
            <div class="bg-[#0b0b14] border border-gray-900 p-3.5 rounded-2xl relative overflow-hidden">
                <p class="text-[9px] text-gray-500 font-bold uppercase tracking-wider">Circulating Balance</p>
                <div class="flex items-baseline gap-1 mt-1">
                    <h3 id="statCirculatingCoins" class="text-2xl font-black text-yellow-400 font-mono">0</h3>
                    <span class="text-[10px] text-gray-400 font-bold">🪙</span>
                </div>
                <i class="fa-solid fa-coins absolute right-4 bottom-4 text-white/5 text-xl"></i>
            </div>
        </div>

        <!-- Navigation Tabs Matrix -->
        <div class="grid grid-cols-2 gap-2">
            <button onclick="switchAdminTab('usersListSection')" id="tabBtn-users" class="py-2.5 bg-purple-900/20 border border-purple-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-users-gear"></i> Users Hub
            </button>
            <button onclick="switchAdminTab('userRequestsSection')" id="tabBtn-requests" class="py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5 relative">
                <i class="fa-solid fa-headset text-amber-400"></i> Recovery Requests
                <span id="requestsBadge" class="hidden bg-amber-500 text-black text-[8px] font-black px-1.5 py-0.2 rounded-full ml-1">0</span>
            </button>
            <button onclick="switchAdminTab('redeemRequestsSection')" id="tabBtn-redeem" class="py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5 relative">
                <i class="fa-solid fa-money-bill-transfer"></i> Redeem Requests
                <span id="redeemBadge" class="hidden bg-yellow-500 text-black text-[8px] font-black px-1.5 py-0.2 rounded-full ml-1">0</span>
            </button>
            <button onclick="toggleLeaderboardFreeze()" id="leaderboardFreezeBtn" class="py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5">
                <i class="fa-solid fa-snowflake"></i> Freeze Board
            </button>
        </div>

        <!-- SEARCH INPUT BOX -->
        <div class="relative">
            <input type="text" id="adminUserSearchBar" oninput="executeClientSearchFilter()" placeholder="Search by UID, Email, or Name..." class="w-full px-4 py-2.5 bg-[#0b0b14] border border-gray-900 rounded-xl text-xs text-white placeholder-gray-600 outline-none focus:border-purple-800 transition-all font-mono">
            <i class="fa-solid fa-magnifying-glass absolute right-4 top-3 text-gray-600 text-xs"></i>
        </div>

        <!-- SECTION 1: USERS LIVE HUB -->
        <section id="usersListSection" class="space-y-3">
            <div class="flex justify-between items-center px-1">
                <h4 class="text-[10px] font-black text-gray-400 uppercase tracking-widest"><i class="fa-solid fa-database text-purple-500"></i> Registered Database Records</h4>
                <button onclick="fetchLatestAdminData()" class="text-[9px] text-purple-400 hover:text-purple-300 font-bold"><i class="fa-solid fa-arrows-rotate"></i> Reload Table</button>
            </div>
            <div id="usersDataContainer" class="space-y-2.5">
                <!-- User rows render dynamically here -->
            </div>
        </section>

        <!-- SECTION 2: USER RECOVERY REQUESTS PORTAL -->
        <section id="userRequestsSection" class="space-y-3 hidden">
            <div class="flex justify-between items-center px-1">
                <h4 class="text-[10px] font-black text-amber-400 uppercase tracking-widest"><i class="fa-solid fa-headset text-amber-500"></i> PIN/DOB Recovery Requests</h4>
                <p class="text-[9px] text-gray-500 font-mono">adminRequests Collection</p>
            </div>
            <div id="userRequestsContainer" class="space-y-2.5">
                <!-- Recovery requests render dynamically here -->
            </div>
        </section>

        <!-- SECTION 3: REDEEM REQUESTS PORTAL -->
        <section id="redeemRequestsSection" class="space-y-3 hidden">
            <div class="flex justify-between items-center px-1">
                <h4 class="text-[10px] font-black text-yellow-400 uppercase tracking-widest"><i class="fa-solid fa-receipt text-yellow-500"></i> Pending Redeem Queue</h4>
                <p class="text-[9px] text-gray-500 font-mono">withdrawals Collection</p>
            </div>
            <div id="redeemRequestsContainer" class="space-y-2.5">
                <!-- Redeem rows render dynamically here -->
            </div>
        </section>

    </main>

    <!-- DYNAMIC OVERLAY MODALS -->
    <div id="adminPortalModal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center p-4 z-50">
        <div id="adminModalBody" class="w-full max-w-sm bg-[#0b0b14] border border-gray-900 p-5 rounded-2xl space-y-4 max-h-[85vh] overflow-y-auto">
            <!-- Dynamic modal content renders here -->
        </div>
    </div>

    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD0AZG6D8H-OZOJK0s5sDyVJ6BLJJKVszc",
          authDomain: "mir-free-rewards-log-and-earn.firebaseapp.com",
          databaseURL: "https://mir-free-rewards-log-and-earn-default-rtdb.firebaseio.com",
          projectId: "mir-free-rewards-log-and-earn",
          storageBucket: "mir-free-rewards-log-and-earn.firebasestorage.app",
          messagingSenderId: "1055267295995",
          appId: "1:1055267295995:web:35ebcfaa35a650a832165e"
        };

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const db = firebase.firestore();

        let cachedUsersList = [];
        let isLeaderboardFrozenState = false;

        window.onload = function() {
            fetchLatestAdminData();
            listenToLeaderboardConfig();
            fetchUserRecoveryRequests();
            listenToRedeemRequestsRealtime();
        };

        // FETCH ALL USERS
        function fetchLatestAdminData() {
            db.collection("users").get().then(snap => {
                cachedUsersList = [];
                let totalCoins = 0;
                
                snap.forEach(doc => {
                    const data = doc.data();
                    data.uid = doc.id;
                    cachedUsersList.push(data);
                    totalCoins += parseInt(data.coins || 0);
                });

                cachedUsersList.sort((a, b) => {
                    const dateA = a.createdAt ? (a.createdAt.seconds || 0) : 0;
                    const dateB = b.createdAt ? (b.createdAt.seconds || 0) : 0;
                    return dateB - dateA;
                });

                document.getElementById("statTotalUsers").innerText = cachedUsersList.length;
                document.getElementById("statCirculatingCoins").innerText = totalCoins;

                renderUsersListMarkup(cachedUsersList);
            });
        }

        // RECOVERY REQUESTS
        function fetchUserRecoveryRequests() {
            db.collection("adminRequests").onSnapshot(snap => {
                renderRecoveryData(snap);
            }, err => {
                db.collection("recovery_requests").onSnapshot(snap2 => {
                    renderRecoveryData(snap2);
                });
            });
        }

        function renderRecoveryData(snap) {
            const container = document.getElementById("userRequestsContainer");
            const badge = document.getElementById("requestsBadge");
            container.innerHTML = "";
            
            let pendingCount = 0;

            if (snap.empty) {
                container.innerHTML = `<p class="text-center text-gray-600 py-6 text-xs font-semibold">No recovery requests found!</p>`;
                badge.classList.add("hidden");
                return;
            }

            let reqList = [];
            snap.forEach(doc => {
                const data = doc.data();
                data.id = doc.id;
                reqList.push(data);

                const st = (data.status || "PENDING").toUpperCase();
                if (st === "PENDING") pendingCount++;
            });

            if (pendingCount > 0) {
                badge.innerText = pendingCount;
                badge.classList.remove("hidden");
            } else {
                badge.classList.add("hidden");
            }

            reqList.sort((a, b) => {
                const timeA = a.timestamp ? (a.timestamp.seconds || 0) : 0;
                const timeB = b.timestamp ? (b.timestamp.seconds || 0) : 0;
                return timeB - timeA;
            });

            reqList.forEach(req => {
                const card = document.createElement("div");
                const st = (req.status || "PENDING").toUpperCase();
                const isPending = (st === "PENDING");
                const targetUid = req.userId || req.userUid || req.uid || "";

                // Formatted Time
                let formattedTime = "N/A";
                if (req.timestamp && req.timestamp.seconds) {
                    formattedTime = new Date(req.timestamp.seconds * 1000).toLocaleString();
                }

                card.className = `p-3.5 bg-black/40 border ${isPending ? 'border-amber-900/50' : 'border-gray-900'} rounded-2xl text-xs space-y-2`;

                card.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-mono text-gray-400">User: <strong class="text-white">${req.userName || req.username || 'User'}</strong></span>
                        <span class="px-2 py-0.5 rounded text-[8px] font-black tracking-wider ${isPending ? 'bg-amber-950/50 text-amber-400 border border-amber-800/40' : 'bg-emerald-950/50 text-emerald-400 border border-emerald-800/40'}">${st}</span>
                    </div>
                    <div class="space-y-1 bg-black/30 p-2 rounded-xl text-[10px] text-gray-300">
                        <p><strong>Type:</strong> ${req.requestType || 'RECOVERY_PIN_AND_DOB'}</p>
                        <p><strong>Email:</strong> ${req.userEmail || 'N/A'}</p>
                        <p class="text-amber-400 font-mono text-[9px]">Requested On: ${formattedTime}</p>
                    </div>
                    ${isPending ? `
                    <div class="flex gap-2 pt-1">
                        <button onclick="resolveUserRequest('${req.id}', '${targetUid}')" class="w-full py-1.5 bg-gradient-to-r from-amber-500 to-amber-600 hover:from-amber-400 hover:to-amber-500 text-black font-black text-[9px] uppercase tracking-wider rounded-lg transition-all">
                            <i class="fa-solid fa-paper-plane"></i> Resolve & Send PIN to Mailbox
                        </button>
                    </div>
                    ` : ''}
                `;
                container.appendChild(card);
            });
        }

        // REDEEM REQUESTS REALTIME LISTENER
        function listenToRedeemRequestsRealtime() {
            db.collection("withdrawals").onSnapshot(snap => {
                processAndRenderRedeems(snap);
            }, err => {
                db.collection("redeems").onSnapshot(snap2 => {
                    processAndRenderRedeems(snap2);
                });
            });
        }

        function processAndRenderRedeems(snap) {
            const container = document.getElementById("redeemRequestsContainer");
            const badge = document.getElementById("redeemBadge");
            container.innerHTML = "";
            
            let pendingCount = 0;

            if (snap.empty) {
                container.innerHTML = `<p class="text-center text-gray-600 py-6 text-xs font-semibold">Redeem requests queue is clean!</p>`;
                badge.classList.add("hidden");
                return;
            }

            let requestsArray = [];
            snap.forEach(doc => {
                const rData = doc.data();
                rData.id = doc.id;
                requestsArray.push(rData);

                const currentStatus = (rData.status || "Pending").toUpperCase();
                if (currentStatus === "PENDING") pendingCount++;
            });

            if (pendingCount > 0) {
                badge.innerText = pendingCount;
                badge.classList.remove("hidden");
            } else {
                badge.classList.add("hidden");
            }

            requestsArray.sort((a, b) => {
                const timeA = a.timestamp ? (a.timestamp.seconds || 0) : 0;
                const timeB = b.timestamp ? (b.timestamp.seconds || 0) : 0;
                return timeB - timeA;
            });

            const nowInMs = Date.now();

            requestsArray.forEach(req => {
                const reqId = req.id;
                const item = document.createElement("div");
                
                const label = req.rewardName || req.rewardname || "Redeem Code";
                const targetAddress = req.payoutDetails || req.targetAddress || "Mailbox";
                const userEmail = req.userEmail || req.userName || "User";
                const coinsUsed = req.coinsUsed || req.coins || 0;
                const rupees = req.rupees || req.amount || "";
                const userUid = req.uid || req.userUid || "";
                
                const statusVal = (req.status || "Pending").toUpperCase();
                const isPending = (statusVal === "PENDING");

                // TIME CALCULATIONS & 48-HOUR WARNING
                let timeString = "Date Unknown";
                let isOverdue = false;

                if (req.timestamp && req.timestamp.seconds) {
                    const requestMs = req.timestamp.seconds * 1000;
                    timeString = new Date(requestMs).toLocaleString();
                    const diffHours = (nowInMs - requestMs) / (1000 * 60 * 60);
                    if (isPending && diffHours >= 48) {
                        isOverdue = true;
                    }
                }

                item.className = `p-3.5 bg-black/30 border ${isOverdue ? 'border-red-600/80 shadow-[0_0_10px_rgba(220,38,38,0.2)]' : (isPending ? 'border-yellow-900/40' : 'border-gray-900')} rounded-2xl text-xs space-y-2 relative`;

                item.innerHTML = `
                    <div class="flex justify-between items-center">
                        <span class="text-[9px] font-mono text-gray-400">User: <strong class="text-white">${userEmail}</strong></span>
                        <div class="flex items-center gap-1">
                            ${isOverdue ? `<span class="bg-red-600 text-white text-[8px] font-black px-1.5 py-0.5 rounded animate-pulse">⚠️ OVERDUE (48h+)</span>` : ''}
                            <span class="px-2 py-0.5 rounded text-[8px] font-black tracking-wider ${isPending ? 'bg-yellow-950/40 text-yellow-400 border border-yellow-800/30' : (statusVal === 'APPROVED' || statusVal === 'SUCCESS' ? 'bg-green-950/40 text-green-400 border border-green-800/30' : 'bg-red-950/40 text-red-400 border border-red-800/30')}">${statusVal}</span>
                        </div>
                    </div>
                    
                    <div class="bg-black/40 p-2.5 rounded-xl border border-white/5 space-y-1">
                        <p class="font-bold text-white text-xs flex justify-between">
                            <span>${label} ${rupees ? '(₹' + rupees + ')' : ''}</span>
                            <span class="text-amber-400 font-mono">${coinsUsed} 🪙</span>
                        </p>
                        <p class="text-purple-400 font-mono text-[10px] mt-0.5">Payout Address: <strong class="text-white select-all">${targetAddress}</strong></p>
                        <p class="text-gray-500 font-mono text-[9px] pt-1 border-t border-white/5 flex justify-between">
                            <span><i class="fa-regular fa-clock"></i> Requested: ${timeString}</span>
                        </p>
                    </div>

                    <div class="flex gap-2 pt-1">
                        <button onclick="inspectUserFullHistory('${userUid}', '${userEmail}')" class="py-1.5 px-2.5 bg-purple-950/40 hover:bg-purple-900/60 border border-purple-800/40 text-purple-300 text-[9px] font-bold rounded-lg uppercase flex items-center gap-1">
                            <i class="fa-solid fa-clock-rotate-left"></i> Check History
                        </button>
                        ${isPending ? `
                        <button onclick="approveRedeemTicket('${reqId}', '${userUid}', '${label}')" class="flex-1 py-1.5 bg-green-700 hover:bg-green-600 text-white text-[9px] font-bold rounded-lg uppercase transition-all">Approve & Code</button>
                        <button onclick="rejectRedeemTicket('${reqId}', '${userUid}')" class="py-1.5 px-2.5 bg-red-900/40 hover:bg-red-900/60 text-red-400 text-[9px] font-bold rounded-lg uppercase transition-all">Reject</button>
                        ` : ''}
                    </div>
                `;
                container.appendChild(item);
            });
        }

        // INSPECT USER HISTORY & ANTI-SCAM DETECTOR
        function inspectUserFullHistory(userUid, userEmail) {
            if (!userUid || userUid === "") {
                alert("User UID not attached with this request!");
                return;
            }

            const modal = document.getElementById("adminPortalModal");
            const body = document.getElementById("adminModalBody");
            modal.style.display = "flex";

            body.innerHTML = `
                <div class="flex justify-between items-center pb-2 border-b border-gray-800">
                    <div>
                        <h3 class="text-xs font-bold text-white uppercase"><i class="fa-solid fa-user-shield text-purple-400"></i> User Audit & History</h3>
                        <p class="text-[9px] text-gray-500 font-mono">${userEmail}</p>
                    </div>
                    <button onclick="closeAdminPortalModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div id="historyModalContent" class="space-y-3 pt-2 text-xs">
                    <p class="text-center text-gray-500 py-4"><i class="fa-solid fa-spinner animate-spin"></i> Fetching complete activity history...</p>
                </div>
            `;

            // Query user data & withdrawal history
            db.collection("users").doc(userUid).get().then(userDoc => {
                const userData = userDoc.exists ? userDoc.data() : {};
                
                db.collection("withdrawals").where("uid", "==", userUid).get().then(wSnap => {
                    let historyHTML = `
                        <div class="bg-black/50 p-2.5 rounded-xl border border-gray-900 space-y-1 font-mono text-[10px]">
                            <p class="text-gray-400">Current Coins: <strong class="text-yellow-400">${userData.coins || 0} 🪙</strong></p>
                            <p class="text-gray-400">PIN: <strong class="text-white">${userData.pin || 'N/A'}</strong> | DOB: <strong class="text-white">${userData.dob || 'N/A'}</strong></p>
                        </div>
                        <h4 class="text-[10px] font-bold text-purple-400 uppercase tracking-wider pt-1">All Redeem Attempts (${wSnap.size})</h4>
                        <div class="space-y-2 max-h-48 overflow-y-auto pr-1">
                    `;

                    if (wSnap.empty) {
                        historyHTML += `<p class="text-gray-600 text-[10px] text-center py-2">No previous redeem requests found.</p>`;
                    } else {
                        wSnap.forEach(hDoc => {
                            const hData = hDoc.data();
                            const hStatus = (hData.status || "Pending").toUpperCase();
                            let hTime = "N/A";
                            if (hData.timestamp && hData.timestamp.seconds) {
                                hTime = new Date(hData.timestamp.seconds * 1000).toLocaleDateString();
                            }

                            historyHTML += `
                                <div class="p-2 bg-black/30 border border-white/5 rounded-lg text-[10px] flex justify-between items-center">
                                    <div>
                                        <p class="font-bold text-white">${hData.rewardName || 'Reward'} (₹${hData.rupees || 0})</p>
                                        <p class="text-gray-500 text-[8px]">${hTime} • ${hData.coinsUsed || 0} coins</p>
                                    </div>
                                    <span class="px-1.5 py-0.5 text-[8px] font-bold rounded ${hStatus === 'APPROVED' ? 'bg-green-950 text-green-400' : (hStatus === 'PENDING' ? 'bg-yellow-950 text-yellow-400' : 'bg-red-950 text-red-400')}">${hStatus}</span>
                                </div>
                            `;
                        });
                    }

                    historyHTML += `</div>`;
                    document.getElementById("historyModalContent").innerHTML = historyHTML;
                });
            });
        }

        // RESOLVE RECOVERY
        function resolveUserRequest(requestId, userUid) {
            const message = prompt("Enter PIN / DOB Details or Recovery Code for user's Mailbox:");
            if (message === null || message.trim() === "") return;

            const fullMessageText = `Admin Response: ${message.trim()}`;

            db.collection("adminRequests").doc(requestId).update({
                status: "RESOLVED"
            }).catch(() => {
                db.collection("recovery_requests").doc(requestId).update({ status: "RESOLVED" });
            }).then(() => {
                if (userUid && userUid !== "" && userUid !== "undefined") {
                    db.collection("users").doc(userUid).collection("mailbox").add({
                        title: "🔐 Recovery Details Delivered",
                        message: fullMessageText,
                        msg: fullMessageText,
                        body: fullMessageText,
                        date: new Date().toLocaleDateString(),
                        timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                        read: false,
                        type: "recovery"
                    });
                }
                alert("✅ Recovery Request Resolved!");
            });
        }

        // APPROVE REDEEM TICKET
        function approveRedeemTicket(requestId, userUid, amountLabel) {
            const code = prompt("Enter the Redeem Code / Voucher Key to send to user's Mailbox:");
            if (code === null || code.trim() === "") return;

            const redeemMsg = `Your request for ${amountLabel} has been APPROVED!\nCode: ${code.trim()}`;
            const updateObj = { status: "APPROVED", resolvedCode: code.trim() };
            
            db.collection("withdrawals").doc(requestId).update(updateObj).catch(() => {
                db.collection("redeems").doc(requestId).update(updateObj);
            });

            if(userUid && userUid !== "" && userUid !== "undefined") {
                db.collection("users").doc(userUid).collection("mailbox").add({
                    title: "🎁 Redeem Request Approved!",
                    message: redeemMsg,
                    msg: redeemMsg,
                    systemCode: code.trim(),
                    date: new Date().toLocaleDateString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false,
                    type: "payout"
                });
            }
            alert("✅ Redeem Request Approved & Code Sent!");
        }

        // REJECT REDEEM TICKET
        function rejectRedeemTicket(requestId, userUid) {
            if (!confirm("Reject this withdrawal request?")) return;

            const rejectMsg = `Your withdrawal request was rejected by Admin. Please contact support.`;
            const updateObj = { status: "REJECTED" };

            db.collection("withdrawals").doc(requestId).update(updateObj).catch(() => {
                db.collection("redeems").doc(requestId).update(updateObj);
            });

            if(userUid && userUid !== "" && userUid !== "undefined") {
                db.collection("users").doc(userUid).collection("mailbox").add({
                    title: "⚠️ Request Rejected",
                    message: rejectMsg,
                    msg: rejectMsg,
                    date: new Date().toLocaleDateString(),
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false,
                    type: "payout"
                });
            }
            alert("Ticket rejected.");
        }

        function renderUsersListMarkup(list) {
            const container = document.getElementById("usersDataContainer");
            container.innerHTML = "";

            if (list.length === 0) {
                container.innerHTML = `<p class="text-center text-gray-600 py-6 text-xs">No users found</p>`;
                return;
            }

            list.forEach(user => {
                const card = document.createElement("div");
                card.className = "bg-[#0b0b14] border border-gray-900 p-3.5 rounded-2xl text-xs space-y-2";
                
                const username = user.name || user.username || "Anonymous User";
                const useremail = user.email || "no-email@registered.com";
                const usercoins = user.coins || 0;
                const securePin = user.pin || user.securePin || "Not Setup";
                const recoveryDob = user.dob || user.recoveryDob || "Not Setup";

                card.innerHTML = `
                    <div class="flex justify-between items-start">
                        <div>
                            <h4 class="font-bold text-white">${username}</h4>
                            <p class="text-gray-500 font-mono text-[10px]">${useremail}</p>
                        </div>
                        <div class="bg-purple-950/30 border border-purple-900/40 px-2 py-0.5 rounded-lg text-purple-400 font-mono font-bold text-[10px]">
                            ${usercoins} 🪙
                        </div>
                    </div>
                    <div class="grid grid-cols-2 gap-2 text-[10px] bg-black/30 p-2 rounded-xl text-gray-400 font-mono">
                        <div>PIN: ${securePin}</div>
                        <div>DOB: ${recoveryDob}</div>
                    </div>
                    <div class="flex gap-2 pt-1">
                        <button onclick="promptEditCoins('${user.uid}', ${usercoins})" class="flex-1 py-1.5 bg-purple-950/30 hover:bg-purple-900/50 border border-purple-800/30 text-purple-300 text-[9px] font-bold rounded-lg uppercase"><i class="fa-solid fa-pen-to-square"></i> Edit Coins</button>
                        <button onclick="deleteUserRecord('${user.uid}')" class="py-1.5 px-3 bg-red-950/20 border border-red-900/30 hover:bg-red-900/30 text-red-400 text-[9px] font-bold rounded-lg uppercase"><i class="fa-solid fa-trash-can"></i></button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function switchAdminTab(activeSectionId) {
            document.getElementById("usersListSection").classList.add("hidden");
            document.getElementById("userRequestsSection").classList.add("hidden");
            document.getElementById("redeemRequestsSection").classList.add("hidden");

            document.getElementById("tabBtn-users").className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
            document.getElementById("tabBtn-requests").className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5 relative";
            document.getElementById("tabBtn-redeem").className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5 relative";

            document.getElementById(activeSectionId).classList.remove("hidden");
            
            if (activeSectionId === "usersListSection") {
                document.getElementById("tabBtn-users").className = "py-2.5 bg-purple-900/20 border border-purple-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
            } else if (activeSectionId === "userRequestsSection") {
                document.getElementById("tabBtn-requests").className = "py-2.5 bg-amber-900/20 border border-amber-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5 relative";
            } else {
                document.getElementById("tabBtn-redeem").className = "py-2.5 bg-purple-900/20 border border-purple-700/50 text-white text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5 relative";
            }
        }

        function listenToLeaderboardConfig() {
            db.collection("app_admin").doc("leaderboard_config").onSnapshot(doc => {
                if (doc.exists) {
                    isLeaderboardFrozenState = doc.data().frozen || false;
                    const btn = document.getElementById("leaderboardFreezeBtn");
                    if (isLeaderboardFrozenState) {
                        btn.className = "py-2.5 bg-red-950/20 border border-red-900/40 text-red-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
                        btn.innerHTML = `<i class="fa-solid fa-snowflake animate-spin-slow"></i> Frozen`;
                    } else {
                        btn.className = "py-2.5 bg-black/40 border border-gray-900 text-gray-400 text-[10px] font-black rounded-xl transition-all uppercase tracking-wider flex items-center justify-center gap-1.5";
                        btn.innerHTML = `<i class="fa-solid fa-snowflake"></i> Freeze Board`;
                    }
                }
            });
        }

        function toggleLeaderboardFreeze() {
            const targetState = !isLeaderboardFrozenState;
            db.collection("app_admin").doc("leaderboard_config").set({
                frozen: targetState
            }).then(() => {
                alert(`Leaderboard status updated!`);
            });
        }

        function executeClientSearchFilter() {
            const query = document.getElementById("adminUserSearchBar").value.toLowerCase().trim();
            if (query === "") {
                renderUsersListMarkup(cachedUsersList);
                return;
            }

            const filtered = cachedUsersList.filter(user => {
                const uid = (user.uid || "").toLowerCase();
                const email = (user.email || "").toLowerCase();
                const name = (user.name || user.username || "").toLowerCase();
                return uid.includes(query) || email.includes(query) || name.includes(query);
            });

            renderUsersListMarkup(filtered);
        }

        function promptEditCoins(userUid, currentCoins) {
            const amount = prompt(`Enter new coin amount for this user:`, currentCoins);
            if (amount === null || isNaN(amount) || amount === "") return;

            db.collection("users").doc(userUid).update({
                coins: parseInt(amount)
            }).then(() => {
                alert("User balance updated!");
                fetchLatestAdminData();
            });
        }

        function deleteUserRecord(userUid) {
            if (!confirm("Are you sure you want to delete this user?")) return;
            db.collection("users").doc(userUid).delete().then(() => {
                alert("User record cleared!");
                fetchLatestAdminData();
            });
        }

        function triggerKeyConfigModal() {
            const modal = document.getElementById("adminPortalModal");
            const body = document.getElementById("adminModalBody");
            modal.style.display = "flex";

            body.innerHTML = `
                <div class="flex justify-between items-center pb-2 border-b border-gray-800">
                    <h3 class="text-xs font-bold text-white uppercase"><i class="fa-solid fa-key text-purple-400"></i> Edit Credentials</h3>
                    <button onclick="closeAdminPortalModal()" class="text-gray-500 hover:text-white"><i class="fa-solid fa-xmark"></i></button>
                </div>
                <div class="space-y-3 pt-2 text-xs">
                    <div>
                        <label class="block text-[9px] text-gray-500 font-bold uppercase mb-1">Username</label>
                        <input type="text" id="editAdminUsername" class="w-full px-3 py-2 bg-black/40 border border-gray-900 rounded-lg text-white">
                    </div>
                    <div>
                        <label class="block text-[9px] text-gray-500 font-bold uppercase mb-1">New Password</label>
                        <input type="password" id="editAdminPassword" class="w-full px-3 py-2 bg-black/40 border border-gray-900 rounded-lg text-white">
                    </div>
                    <button onclick="saveNewAdminKeys()" class="w-full py-2 bg-purple-700 hover:bg-purple-600 text-white font-bold rounded-lg uppercase">Update Key</button>
                </div>
            `;

            db.collection("app_admin").doc("credentials").get().then(doc => {
                if (doc.exists) {
                    document.getElementById("editAdminUsername").value = doc.data().username || "admin";
                    document.getElementById("editAdminPassword").value = doc.data().password || "root123";
                }
            });
        }

        function saveNewAdminKeys() {
            const u = document.getElementById("editAdminUsername").value.trim();
            const p = document.getElementById("editAdminPassword").value.trim();

            if (u === "" || p === "") {
                alert("Credentials can't be empty!");
                return;
            }

            db.collection("app_admin").doc("credentials").set({
                username: u,
                password: p
            }).then(() => {
                alert("🔑 Administration credentials changed successfully!");
                closeAdminPortalModal();
            });
        }

        function closeAdminPortalModal() {
            document.getElementById("adminPortalModal").style.display = "none";
        }

        function handleAdminLogout() {
            sessionStorage.removeItem("admin_authenticated_session");
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
