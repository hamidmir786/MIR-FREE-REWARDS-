<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MIR FREE REWARDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Standard Integration Framework -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body {
            background-color: #080710;
            color: #ffffff;
            font-family: 'Poppins', system-ui, sans-serif;
            overflow-x: hidden;
        }
        .app-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
            padding-bottom: 100px;
        }
        .premium-card {
            background: #131124;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }
        
        /* Daily Check-In Styles */
        .checkin-line {
            position: relative;
        }
        .checkin-line::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 4px;
            background: #252147;
            z-index: 1;
            transform: translateY(-50%);
        }
        .checkin-node {
            position: relative;
            z-index: 2;
            width: 54px;
            height: 54px;
            border-radius: 50%;
            background: #ffffff;
            color: #111;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }
        .checkin-node.completed {
            background: #dcfce7;
            color: #15803d;
            border: 3px solid #86efac;
        }
        .checkin-node.active {
            background: #4ade80;
            color: #ffffff;
            border: 3px solid #22c55e;
        }

        /* Ultimate Lucky Spin Wheel Animation UI */
        .wheel-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto;
        }
        .wheel-canvas {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 8px solid #3b1d5c;
            box-shadow: 0 0 25px rgba(168, 85, 247, 0.4);
            transition: transform 4s cubic-bezier(0.1, 0.8, 0.3, 1);
        }
        .wheel-pointer {
            position: absolute;
            top: -12px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 10;
            width: 0; 
            height: 0; 
            border-left: 14px solid transparent;
            border-right: 14px solid transparent;
            border-top: 28px solid #eab308;
        }
    </style>
</head>
<body class="p-3 select-none">

    <div class="app-container space-y-4">
        
        <!-- TOP PROFILE HEADER BLOCK -->
        <div class="w-full p-4 premium-card flex justify-between items-center shadow-2xl">
            <div class="flex items-center gap-3">
                <img id="userAvatar" src="https://ui-avatars.com/api/?name=User&background=6b21a8&color=fff" alt="Avatar" class="w-10 h-10 rounded-full border border-purple-500">
                <div>
                    <h2 id="userName" class="text-sm font-bold truncate max-w-[140px]">Loading...</h2>
                    <p class="text-[10px] text-gray-400">Status: Verified Player</p>
                </div>
            </div>
            <div class="flex gap-2">
                <div class="px-2.5 py-1.5 rounded-xl bg-[#1f1b3a] flex items-center gap-1">
                    <i class="fa-solid fa-coins text-amber-400 text-xs"></i>
                    <span id="coinCounter" class="text-xs font-black text-amber-300 font-mono">0</span>
                </div>
                <div class="px-2.5 py-1.5 rounded-xl bg-[#1f1b3a] flex items-center gap-1">
                    <i class="fa-solid fa-gem text-cyan-400 text-xs"></i>
                    <span id="diamondCounter" class="text-xs font-black text-cyan-300 font-mono">0</span>
                </div>
            </div>
        </div>

        <!-- 1. VISUAL DAILY CHECK-IN MATRIX -->
        <div class="w-full p-4 premium-card shadow-lg space-y-3">
            <h3 class="text-sm font-black tracking-wide text-gray-200 uppercase">Daily Check-In</h3>
            <div class="w-full h-px bg-gray-800 my-2"></div>
            
            <div class="checkin-line flex justify-between items-center px-1 py-4 overflow-x-auto">
                <!-- Dynamic Nodes will inject here via Engine -->
                <div id="checkinNodesWrapper" class="w-full flex justify-between items-center min-w-[340px]"></div>
            </div>
        </div>

        <!-- 2. DAILY BONUS COINS BANNER -->
        <div class="w-full p-4 rounded-2xl bg-[#0f0b21] border border-[#221947] flex justify-between items-center shadow-lg">
            <div class="flex items-center gap-4">
                <div class="relative flex items-center justify-center">
                    <i class="fa-solid fa-coins text-amber-400 text-3xl drop-shadow-[0_4px_10px_rgba(234,179,8,0.3)]"></i>
                    <i class="fa-solid fa-coins text-amber-500 text-xl absolute -bottom-1 -right-2"></i>
                </div>
                <div>
                    <h4 class="text-sm font-black text-yellow-500 tracking-wide">Daily Bonus Coins</h4>
                    <p class="text-[10px] text-gray-400 mt-0.5">Claim Coins & Increase Your Leaderboard Points</p>
                    <span class="text-[10px] text-emerald-400 font-bold block mt-1"><i class="fa-solid fa-bolt"></i> Just 3-5 min</span>
                </div>
            </div>
            <div class="text-right flex flex-col items-end gap-1.5">
                <span class="text-sm font-black text-white font-mono">100 Coins</span>
                <button onclick="claimDailyBonusCoins()" id="bonusCoinsBtn" class="px-4 py-2 bg-emerald-600 hover:bg-emerald-500 font-black text-xs uppercase tracking-wider text-white rounded-lg transition-transform active:scale-95 shadow-md">
                    CLAIM
                </button>
            </div>
        </div>

        <!-- 3. REALTIME CSS SPIN WHEEL CORE ENGINE -->
        <div class="w-full p-5 premium-card shadow-2xl text-center space-y-4">
            <header>
                <h3 class="text-xs font-bold text-gray-300 tracking-wider uppercase">Daily 50 spin wheel to 10x Fast Earn</h3>
            </header>

            <!-- Dynamic Wheel Construction Render -->
            <div class="wheel-wrapper my-4">
                <div class="wheel-pointer"></div>
                <canvas id="wheelCanvas" class="wheel-canvas" width="300" height="300"></canvas>
            </div>

            <p id="spinLimitDisplay" class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Daily 50 Spin Limit</p>
            
            <button onclick="launchLuckySpinSequence()" id="spinBtn" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-black text-sm uppercase tracking-widest rounded-xl shadow-lg transition-all active:scale-[0.97] flex items-center justify-center gap-2">
                SPIN NOW <span class="text-xs font-normal opacity-80">(<i class="fa-solid fa-circle-play"></i> Watch Ad)</span>
            </button>

            <!-- FIRE AIM VOUCHER EXCHANGE STRIP -->
            <div class="w-full mt-4 p-3 bg-[#0a0818] rounded-xl border border-purple-900/30 flex justify-between items-center">
                <div class="flex items-center gap-2">
                    <div class="bg-gradient-to-r from-red-600 to-pink-600 text-[8px] font-black tracking-tighter px-2 py-1 rounded text-white uppercase shadow-inner border border-white/10 flex items-center gap-1">
                        <i class="fa-solid fa-ticket text-[9px]"></i> FIRE AIM VOUCHER
                    </div>
                </div>
                <div class="flex items-center gap-3">
                    <span class="text-xs font-mono font-black text-gray-200">2 Coins</span>
                    <button onclick="exchangeCoinsForVoucher()" class="px-4 py-1.5 bg-green-600 hover:bg-green-500 text-[10px] font-black uppercase tracking-wider text-white rounded-lg shadow transition-all active:scale-95">
                        EXCHANGE
                    </button>
                </div>
            </div>
        </div>

    </div>

    <!-- MAIN SYSTEM ARCHITECTURE CONTROLLER -->
    <script>
        // Production System Configuration Mapping
        const firebaseConfig = {
          apiKey: "AIzaSyD0AZG6D8H-OZOJK0s5sDyVJ6BLJJKVszc",
          authDomain: "mir-free-rewards-log-and-earn.firebaseapp.com",
          databaseURL: "https://mir-free-rewards-log-and-earn-default-rtdb.firebaseio.com",
          projectId: "mir-free-rewards-log-and-earn",
          storageBucket: "mir-free-rewards-log-and-earn.firebasestorage.app",
          messagingSenderId: "1055267295995",
          appId: "1:1055267295995:web:35ebcfaa35a650a832165e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let currentUserUID = null, userData = {};
        let isWheelSpinning = false;

        // Strict Anti-Bankruptcy Wheel Segment Setup (Matches exactly with your image labels)
        const segments = [
            { text: "5 COINS", type: "coins", val: 5, color: "#fff3e0", prob: 40 },
            { text: "10 COINS", type: "coins", val: 10, color: "#ffe0b2", prob: 10 },
            { text: "2000 COINS", type: "coins", val: 2000, color: "#fff3e0", prob: 0.01 }, // 0.01% Ultra Safe Guard
            { text: "3 VOUCHERS", type: "vouchers", val: 3, color: "#ffe0b2", prob: 10.99 },
            { text: "50 COINS", type: "coins", val: 50, color: "#fff3e0", prob: 2 },
            { text: "RE TRY", type: "retry", val: 0, color: "#ffe0b2", prob:37 } // Safe Failure Node
        ];

        auth.onAuthStateChanged((user) => {
            if (user) {
                currentUserUID = user.uid;
                syncUserProfileData();
            } else {
                window.location.href = "index.html";
            }
        });

        function syncUserProfileData() {
            db.collection("users").doc(currentUserUID).onSnapshot((doc) => {
                if(doc.exists) {
                    userData = doc.data();
                    updateUserDashboardUI();
                }
            });
        }

        function updateUserDashboardUI() {
            document.getElementById("userName").innerText = userData.name || "User Node";
            document.getElementById("coinCounter").innerText = userData.coins || 0;
            document.getElementById("diamondCounter").innerText = userData.diamonds || 0;
            if(userData.photo) document.getElementById("userAvatar").src = userData.photo;

            document.getElementById("spinLimitDisplay").innerText = `Daily ${50 - (userData.spinCount || 0)} Spin Limit`;
            buildDailyCheckInTimeline();
        }

        // DYNAMIC GRAPHICAL TIMELINE GENERATION ENGINE
        function buildDailyCheckInTimeline() {
            const wrapper = document.getElementById("checkinNodesWrapper");
            wrapper.innerHTML = "";
            const currentDayCount = (userData.checkInStreak % 5) || 1; 

            for(let i = 1; i <= 5; i++) {
                const node = document.createElement("div");
                node.className = "flex flex-col items-center gap-1.5";
                
                let innerContent = i;
                let nodeStatusStyle = "bg-zinc-800 text-gray-500 border-2 border-zinc-700";

                if (i < currentDayCount) {
                    nodeStatusStyle = "bg-green-100 text-green-700 border-2 border-green-300";
                    innerContent = '<i class="fa-solid fa-check text-sm"></i>';
                } else if (i === currentDayCount) {
                    nodeStatusStyle = "bg-green-500 text-white border-2 border-green-600 animate-pulse";
                    innerContent = '<i class="fa-solid fa-gift text-sm text-yellow-200"></i>';
                } else {
                    if(i === 4) innerContent = "15<br><span class='text-[6px] block'>Tokens</span>";
                    if(i === 5) innerContent = "20<br><span class='text-[6px] block'>Tokens</span>";
                }

                node.innerHTML = `
                    <div class="w-12 h-12 rounded-full flex items-center justify-center font-black text-xs text-center shadow-lg ${nodeStatusStyle}">
                        ${innerContent}
                    </div>
                    <span class="text-[9px] font-bold uppercase tracking-wider text-gray-400">${i === currentDayCount ? 'Today' : 'Day ' + i}</span>
                `;
                
                if(i === currentDayCount) {
                    node.onclick = () => processDailyTimelineClaim();
                    node.style.cursor = "pointer";
                }
                wrapper.appendChild(node);
            }
        }

        function simulateNetworkAdBlock(callback) {
            setTimeout(callback, 1000); // 1-second clean interstitial mock load
        }

        // DAILY RETRIEVAL VERIFICATION CONTROLLER
        function processDailyTimelineClaim() {
            const todayStr = new Date().toDateString();
            if(userData.lastCheckInTimestamp === todayStr) {
                alert("🔒 You have already processed today's check-in node payload data stream!");
                return;
            }

            simulateNetworkAdBlock(() => {
                let currentStreak = userData.checkInStreak || 0;
                currentStreak++;
                let dynamicBonusReward = 10;
                
                if(currentStreak % 4 === 0) dynamicBonusReward = 15;
                if(currentStreak % 5 === 0) dynamicBonusReward = 20;

                db.collection("users").doc(currentUserUID).update({
                    coins: firebase.firestore.FieldValue.increment(dynamicBonusReward),
                    lastCheckInTimestamp: todayStr,
                    checkInStreak: currentStreak
                }).then(() => alert(`🎉 Check-in verified! Allocation of ${dynamicBonusReward} Tokens added successfully.`));
            });
        }

        // DAILY 100 BONUS COINS FUNCTION
        function claimDailyBonusCoins() {
            const todayStr = new Date().toDateString();
            if (userData.lastBonusClaimTimestamp === todayStr) {
                alert("🔒 Daily Bonus Payload already claimed! Reset triggers at 12:00 AM.");
                return;
            }

            simulateNetworkAdBlock(() => {
                db.collection("users").doc(currentUserUID).update({
                    coins: firebase.firestore.FieldValue.increment(100),
                    leaderboardPoints: firebase.firestore.FieldValue.increment(50),
                    lastBonusClaimTimestamp: todayStr
                }).then(() => alert("✅ Success! 100 Daily Bonus Coins & 50 Ranks points tracked to your profile layer."));
            });
        }

        // HIGH PRECISION PROBABILITY ALGORITHMIC WHEEL RENDER ENGINE
        const canvas = document.getElementById("wheelCanvas"), ctx = canvas.getContext("2d");
        const arcSize = (Math.PI * 2) / segments.length;

        function drawVisualMatrixWheel() {
            segments.forEach((seg, i) => {
                const currentAngle = i * arcSize;
                ctx.fillStyle = seg.color;
                ctx.beginPath();
                ctx.moveTo(150, 150);
                ctx.arc(150, 150, 140, currentAngle, currentAngle + arcSize);
                ctx.lineTo(150, 150);
                ctx.fill();

                // Inject Labels inside graphical frames
                ctx.save();
                ctx.fillStyle = "#111111";
                if(seg.text === "RE TRY") ctx.fillStyle = "#d32f2f";
                ctx.font = "bold 10px sans-serif";
                ctx.translate(150, 150);
                ctx.rotate(currentAngle + arcSize / 2);
                ctx.textAlign = "right";
                ctx.fillText(seg.text, 125, 5);
                ctx.restore();
            });
        }
        drawVisualMatrixWheel();

        function launchLuckySpinSequence() {
            if(isWheelSpinning) return;
            let dailySpins = userData.spinCount || 0;
            if(dailySpins >= 50) {
                alert("⛔ Security Block: Daily 50 allocations exhausted.");
                return;
            }

            simulateNetworkAdBlock(() => {
                isWheelSpinning = true;
                
                // Pure Strict Random Mathematical Mapping
                const seed = Math.random() * 100;
                let selectedIndex = 5; // Default Safe Element Fallback
                let cumulativeProb = 0;

                for(let i = 0; i < segments.length; i++) {
                    cumulativeProb += segments[i].prob;
                    if(seed <= cumulativeProb) {
                        selectedIndex = i;
                        break;
                    }
                }

                // Mathematical Calculation targeting targeted arc angle structure
                const degreeOffset = 360 - (selectedIndex * (360 / segments.length)) - (360 / (segments.length * 2));
                const terminalRotationAngle = 3600 + degreeOffset; // 10 automated complete revolution loop spins

                canvas.style.transform = `rotate(${terminalRotationAngle}deg)`;

                setTimeout(() => {
                    const prize = segments[selectedIndex];
                    let dbUpdateBlock = { spinCount: firebase.firestore.FieldValue.increment(1) };
                    let outputLog = "";

                    if(prize.type === "coins") {
                        dbUpdateBlock.coins = firebase.firestore.FieldValue.increment(prize.val);
                        outputLog = `🎁 Claimed: ${prize.val} Coins asset transaction registered!`;
                    } else if(prize.type === "diamonds") {
                        dbUpdateBlock.diamonds = firebase.firestore.FieldValue.increment(prize.val);
                        outputLog = `💎 Claimed: ${prize.val} Rare Diamonds processed!`;
                    } else {
                        outputLog = "💥 Better Luck Next Time! System status alignment shifted.";
                    }

                    db.collection("users").doc(currentUserUID).update(dbUpdateBlock).then(() => {
                        alert(outputLog);
                        canvas.style.transition = "none";
                        canvas.style.transform = `rotate(${degreeOffset}deg)`;
                        setTimeout(() => { canvas.style.transition = "transform 4s cubic-bezier(0.1, 0.8, 0.3, 1)"; }, 50);
                        isWheelSpinning = false;
                    });
                }, 4000);
            });
        }

        function exchangeCoinsForVoucher() {
            let currentCoins = userData.coins || 0;
            if(currentCoins < 2) {
                alert("❌ Resource Deficiency: Minimally 2 Coins are required to buy 1 Fire Aim Voucher!");
                return;
            }
            db.collection("users").doc(currentUserUID).update({
                coins: firebase.firestore.FieldValue.increment(-2),
                vouchers: firebase.firestore.FieldValue.increment(1)
            }).then(() => alert("🎟️ Successfully Exchanged 5 Coins for 1 Fire Aim Voucher!"));
        }
    </script>
</body>
</html>
