<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Quantum Spin Wheel - MIR FREE REWARDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Firebase Libraries -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        body { background-color: #09070f; color: #f3f4f6; font-family: 'Segoe UI', system-ui, sans-serif; }
        .premium-panel { background: rgba(19, 15, 36, 0.9); border: 1px solid rgba(168, 85, 247, 0.2); }
        .wheel-container { position: relative; width: 260px; height: 260px; margin: 0 auto; }
        #wheel { width: 100%; height: 100%; border-radius: 50%; border: 4px solid #a855f7; transition: transform 4s cubic-bezier(0.15, 0.99, 0.18, 1); }
        .pointer { position: absolute; top: -10px; left: 50%; transform: translateX(-50%); width: 0; height: 0; border-left: 12px solid transparent; border-right: 12px solid transparent; border-top: 20px solid #eab308; z-index: 10; }
    </style>
</head>
<body class="p-4 flex flex-col min-h-screen justify-between">

    <div class="max-w-md mx-auto w-full space-y-4">
        
        <!-- HEADER NAV -->
        <div class="flex items-center justify-between p-3 rounded-2xl premium-panel shadow-lg">
            <a href="homepage.html" class="px-3 py-1.5 bg-purple-950/60 border border-purple-800/40 rounded-xl text-purple-300 text-xs font-bold flex items-center gap-2">
                <i class="fa-solid fa-arrow-left"></i> Home
            </a>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-1 bg-black/50 px-2.5 py-1 rounded-xl border border-amber-500/30 font-mono text-xs">
                    <i class="fa-solid fa-coins text-amber-400"></i>
                    <span id="userCoins" class="font-black text-amber-300">0</span>
                </div>
                <div class="flex items-center gap-1 bg-black/50 px-2.5 py-1 rounded-xl border border-purple-500/30 font-mono text-xs">
                    <i class="fa-solid fa-ticket text-purple-400"></i>
                    <span id="userVouchers" class="font-black text-purple-300">0</span>
                </div>
            </div>
        </div>

        <!-- MAIN CONTAINER -->
        <div class="p-5 rounded-3xl premium-panel text-center space-y-5 shadow-2xl">
            
            <div class="flex justify-between items-center border-b border-purple-900/30 pb-3">
                <h2 class="text-xs font-black uppercase tracking-wider text-purple-400 flex items-center gap-2">
                    <i class="fa-solid fa-arrows-spin text-purple-500"></i> Quantum Spin Wheel
                </h2>
                <span id="spinLimitText" class="text-xs font-mono text-gray-400 font-bold">Limits: --/40</span>
            </div>

            <!-- SPIN WHEEL CANVAS -->
            <div class="wheel-container my-4">
                <div class="pointer"></div>
                <svg id="wheel" viewBox="0 0 100 100"></svg>
            </div>

            <!-- ACTIONS -->
            <div class="space-y-2.5">
                <button id="spinBtn" onclick="executeSpin()" class="w-full py-3.5 bg-gradient-to-r from-purple-700 to-indigo-600 hover:from-purple-600 hover:to-indigo-500 font-black text-xs text-white uppercase tracking-widest rounded-2xl shadow-lg active:scale-95 transition-all">
                    SPIN NOW (1 Voucher)
                </button>

                <div class="flex items-center justify-between p-2.5 bg-black/40 rounded-xl border border-purple-900/20">
                    <span class="text-[11px] font-bold text-gray-300">Buy 1 System Voucher</span>
                    <button onclick="buyVoucher()" class="px-3 py-1.5 bg-amber-500 hover:bg-amber-400 text-black font-black text-[10px] uppercase rounded-lg shadow active:scale-95 transition-all">
                        Exchange (5 Coins)
                    </button>
                </div>
            </div>

        </div>

    </div>

    <!-- FIREBASE AND SPIN ENGINE -->
    <script>
        const firebaseConfig = {
          apiKey: "AIzaSyD0AZG6D8H-OZOJK0s5sDyVJ6BLJJKVszc",
          authDomain: "mir-free-rewards-log-and-earn.firebaseapp.com",
          databaseURL: "https://mir-free-rewards-log-and-earn-default-rtdb.firebaseio.com",
          projectId: "mir-free-rewards-log-and-earn",
          storageBucket: "mir-free-rewards-log-and-earn.firebasestorage.app",
          messagingSenderId: "1055267295995",
          appId: "1:1055267295995:web:35ebcfaa35a650a832165e"
        };

        if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth(), db = firebase.firestore();

        let uid = null, userState = {};
        let isSpinning = false;
        let currentRotation = 0;

        // Wheel visual display configuration
        const rewards = [
            { label: "5 Coins", value: 5, type: "coins", color: "#4c1d95", chance: 300 },
            { label: "Retry", value: 0, type: "none", color: "#1e1b4b", chance: 350 },
            { label: "10 Coins", value: 10, type: "coins", color: "#581c87", chance: 200 },
            { label: "3 Vouchers", value: 3, type: "vouchers", color: "#312e81", chance: 100 },
            { label: "25 Coins", value: 50, type: "coins", color: "#6b21a8", chance: 10 },
            { label: "1500 Coins", value: 1500, type: "coins", color: "#7e22ce", chance: 0.01 } // 0.001% chance
        ];

        function getTodayDateString() {
            const today = new Date();
            return `${today.getFullYear()}-${today.getMonth() + 1}-${today.getDate()}`;
        }

        auth.onAuthStateChanged((user) => {
            if (user) {
                uid = user.uid;
                db.collection("users").doc(uid).onSnapshot((doc) => {
                    if (doc.exists) {
                        userState = doc.data();
                        document.getElementById("userCoins").innerText = userState.coins || 0;
                        document.getElementById("userVouchers").innerText = userState.vouchers || 0;

                        const todayStr = getTodayDateString();
                        const todaySpins = userState.lastSpinDate === todayStr ? (userState.spinCount || 0) : 0;
                        document.getElementById("spinLimitText").innerText = `Limits: ${todaySpins}/40`;
                    }
                });
                drawWheel();
            } else {
                window.location.href = "index.html";
            }
        });

        function drawWheel() {
            const svg = document.getElementById("wheel");
            const numSlices = rewards.length;
            const sliceAngle = 360 / numSlices;
            let svgContent = "";

            rewards.forEach((reward, i) => {
                const startAngle = i * sliceAngle;
                const endAngle = (i + 1) * sliceAngle;
                const x1 = 50 + 50 * Math.cos(Math.PI * (startAngle - 90) / 180);
                const y1 = 50 + 50 * Math.sin(Math.PI * (startAngle - 90) / 180);
                const x2 = 50 + 50 * Math.cos(Math.PI * (endAngle - 90) / 180);
                const y2 = 50 + 50 * Math.sin(Math.PI * (endAngle - 90) / 180);

                const textAngle = startAngle + sliceAngle / 2;
                const tx = 50 + 32 * Math.cos(Math.PI * (textAngle - 90) / 180);
                const ty = 50 + 32 * Math.sin(Math.PI * (textAngle - 90) / 180);

                svgContent += `
                    <path d="M50,50 L${x1},${y1} A50,50 0 0,1 ${x2},${y2} Z" fill="${reward.color}" stroke="#09070f" stroke-width="1"/>
                    <text x="${tx}" y="${ty}" fill="#ffffff" font-size="5.5" font-weight="bold" text-anchor="middle" dominant-baseline="middle" transform="rotate(${textAngle}, ${tx}, ${ty})">
                        ${reward.label}
                    </text>
                `;
            });

            svg.innerHTML = svgContent;
        }

        function buyVoucher() {
            const coins = userState.coins || 0;
            if (coins < 5) {
                alert("❌ Insufficient Coins! You need at least 5 Coins to buy 1 Voucher.");
                return;
            }

            db.collection("users").doc(uid).update({
                coins: firebase.firestore.FieldValue.increment(-5),
                vouchers: firebase.firestore.FieldValue.increment(1)
            }).then(() => {
                alert("✅ Successfully Purchased 1 Voucher for 5 Coins!");
            });
        }

        // Weighted Probability Algorithm
        function getWeightedRandomIndex() {
            const totalWeight = rewards.reduce((sum, r) => sum + r.chance, 0);
            let randomNum = Math.floor(Math.random() * totalWeight);
            
            for (let i = 0; i < rewards.length; i++) {
                if (randomNum < rewards[i].chance) {
                    return i;
                }
                randomNum -= rewards[i].chance;
            }
            return 1; // Fallback to Retry
        }

        function executeSpin() {
            if (isSpinning) return;

            const vouchers = userState.vouchers || 0;
            if (vouchers < 1) {
                alert("❌ You don't have enough Vouchers! Exchange 5 Coins to buy 1 Voucher.");
                return;
            }

            const todayStr = getTodayDateString();
            const todaySpins = userState.lastSpinDate === todayStr ? (userState.spinCount || 0) : 0;

            if (todaySpins >= 40) {
                alert("🚫 Daily Spin Limit Reached (40/40)! Come back tomorrow after 12:00 AM.");
                return;
            }

            isSpinning = true;
            document.getElementById("spinBtn").disabled = true;

            // DEDUCT 1 VOUCHER IMMEDIATELY
            db.collection("users").doc(uid).update({
                vouchers: firebase.firestore.FieldValue.increment(-1)
            }).then(() => {
                // Calculate outcome based on STRICT percentages
                const winningIndex = getWeightedRandomIndex();
                
                const sliceAngle = 360 / rewards.length;
                const targetDegree = 360 - (winningIndex * sliceAngle + sliceAngle / 2);
                
                const extraRounds = 5 * 360;
                currentRotation += extraRounds + (targetDegree - (currentRotation % 360));
                
                const wheel = document.getElementById("wheel");
                wheel.style.transform = `rotate(${currentRotation}deg)`;

                setTimeout(() => {
                    const winningReward = rewards[winningIndex];
                    let coinInc = 0;
                    let voucherInc = 0;

                    if (winningReward.type === "coins") coinInc = winningReward.value;
                    if (winningReward.type === "vouchers") voucherInc = winningReward.value;

                    // Sync Reward & Daily Count in Database
                    db.collection("users").doc(uid).update({
                        coins: firebase.firestore.FieldValue.increment(coinInc),
                        vouchers: firebase.firestore.FieldValue.increment(voucherInc),
                        spinCount: todaySpins + 1,
                        lastSpinDate: todayStr
                    }).then(() => {
                        if (winningReward.type === "none") {
                            alert("🔁 Retry try again.");
                        } else {
                            alert(`🎉 Congratulations! You won ${winningReward.label}!`);
                        }
                        isSpinning = false;
                        document.getElementById("spinBtn").disabled = false;
                    });
                }, 4000);
            });
        }
    </script>
</body>
</html>
